<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic ERP - Master Edition v10.0</title>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #1abc9c; --accent: #3498db;
            --danger: #e74c3c; --warning: #f39c12; --light: #f4f7f6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        nav { background: #34495e; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 1000; justify-content: center; }
        nav button { background: var(--secondary); border: none; padding: 8px 15px; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .section { background: var(--white); padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .badge { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .check-group { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .check-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; }
        
        @media print {
            nav, header, button, .no-print, #adminPanel, .section:not(#prescription), #templateSelector { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            #prescription { display: block !important; padding: 0; margin-top: 100px; }
            pre { white-space: pre-wrap; font-family: 'Segoe UI', sans-serif; font-size: 17px; border:none; }
        }
        .inventory-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header class="no-print">CLINIC MASTER ERP v10.0</header>

<nav class="no-print">
    <button onclick="scrollToSection('prescription')">New Prescription</button>
    <button onclick="scrollToSection('reviewQueue')">Review Queue</button>
    <button onclick="openAdmin()">Authorized Admin</button>
</nav>

<div class="container">
    <div id="alertsContainer" class="no-print"></div>

    <div id="prescription" class="section">
        <h3 class="no-print">Patient Demographics</h3>
        <div class="grid-3">
            <input id="name" placeholder="Patient Name">
            <input type="number" id="age" placeholder="Age" oninput="checkPediatric()">
            <select id="gender"><option>Male</option><option>Female</option></select>
        </div>
        <div id="pediatricWarning" class="hidden badge">⚠ <strong>Pediatric Alert:</strong> Please verify mg/kg dosage.</div>

        <div class="no-print">
            <h3>History Template</h3>
            <select id="templateSelector" multiple onchange="applyMultiTemplates()"></select>
            <div id="historyCheckboxList" style="margin:10px 0;"></div>
            <textarea id="extraHistory" rows="2" placeholder="Clinical Findings..."></textarea>
        </div>

        <div class="grid-3 no-print">
            <input id="bp" placeholder="BP">
            <input id="pr" placeholder="Pulse">
            <input id="temp" placeholder="Temp">
        </div>

        <h3>Prescription (Rx)</h3>
        <div class="no-print" style="display:flex; gap:10px;">
            <input list="medList" id="rxInput" placeholder="Quick Search Stock...">
            <datalist id="medList"></datalist>
            <button class="action" onclick="addManualRx()">Add Med</button>
        </div>
        <textarea id="rx" rows="10" placeholder="Med Name 1 BD X 5 DAYS" onkeyup="updateMRP()"></textarea>

        <h3>Investigations</h3>
        <div class="check-group">
            <label><input type="checkbox" class="lab-test" value="CBC"> CBC</label>
            <label><input type="checkbox" class="lab-test" value="ESR"> ESR</label>
            <label><input type="checkbox" class="lab-test" value="URINE R/E"> URINE R/E</label>
            <label><input type="checkbox" class="lab-test" value="USG ABDOMEN"> USG ABDOMEN</label>
            <label><input type="checkbox" class="lab-test" value="RBS"> RBS</label>
        </div>

        <div class="no-print" style="margin-top:15px; padding:10px; background:#f0f7ff; border-radius:8px;">
            <label><input type="checkbox" id="markForReview"> Keep in Review List</label>
            <button onclick="saveCurrentAsTemplate()" style="float:right; border:none; background:none; color:var(--accent); text-decoration:underline; cursor:pointer;">Save as Template</button>
        </div>
    </div>

    <div id="billing" class="section no-print">
        <h3>Billing & Secret Code</h3>
        <div class="grid-3">
            <div><label>Consult Fee</label><input id="cf" type="number" value="0" oninput="updateMRP()"></div>
            <div><label>Medicine MRP</label><input id="mrp" type="number" value="0" readonly></div>
            <div><label>Fee Code Only</label><input id="secretCodeDisp" readonly style="background:#eee; font-weight:bold;"></div>
        </div>
    </div>

    <div id="reviewQueue" class="section no-print"><h3>Active Review Queue</h3><div id="reviewListUI"></div></div>

    <div id="adminPanel" class="section hidden no-print">
        <h2>Admin Suite</h2>
        <div class="grid-3" style="margin-bottom:20px;">
            <div class="stat-card"><span>Today's Patients</span><h2 id="statPatients">0</h2></div>
            <div class="stat-card"><span>Today's Income</span><h2 id="statIncome">₹0</h2></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="action" onclick="showTab('invTab')">Inventory</button>
            <button class="action" onclick="showTab('tempTab')">Templates</button>
            <button class="action" onclick="showTab('logTab')">Logs</button>
        </div>
        <div id="invTab">
            <div class="grid-3">
                <input id="medName" placeholder="Med Name">
                <input id="stock" type="number" placeholder="Stock Qty">
                <input id="mrpInv" type="number" placeholder="MRP/Unit">
                <input id="expDate" type="date">
            </div>
            <button class="action" onclick="saveMedicine()" style="width:100%; margin-top:10px;">Update Stock</button>
            <div id="inventoryListUI" style="margin-top:20px;"></div>
        </div>
        <div id="tempTab" class="hidden"><div id="templateListUI"></div></div>
        <div id="logTab" class="hidden"><div id="logListUI"></div></div>
    </div>
</div>

<button id="printBtn" class="no-print" onclick="processPrint()" style="display:block; margin:40px auto; padding:15px 100px; background:var(--secondary); color:white; border:none; border-radius:12px; font-size:22px; cursor:pointer; font-weight:bold;">PRINT RX</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
        collection, addDoc, updateDoc, doc, getDocs, deleteDoc, serverTimestamp, query, orderBy 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdwITU8DS8u9cMEabaoLRAwqmS1P8AegA",
        authDomain: "prescription-drjmd.firebaseapp.com",
        projectId: "prescription-drjmd",
        storageBucket: "prescription-drjmd.firebasestorage.app",
        messagingSenderId: "530828278027",
        appId: "1:530828278027:web:b2c437c98eedb4c23d0a0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });

    let inventory = [], templates = [], logs = [], activeLogId = null, editingInvId = null;

    // --- BINDING FUNCTIONS TO WINDOW ---
    window.scrollToSection = (id) => document.getElementById(id).scrollIntoView({behavior:"smooth"});
    window.openAdmin = () => { if(prompt("Auth?") === "1234") document.getElementById("adminPanel").classList.toggle("hidden"); };
    window.showTab = (id) => { ["invTab", "tempTab", "logTab"].forEach(t => document.getElementById(t).classList.add("hidden")); document.getElementById(id).classList.remove("hidden"); };
    window.checkPediatric = () => document.getElementById("pediatricWarning").classList.toggle("hidden", !(document.getElementById("age").value < 14));
    
    window.addManualRx = () => {
        const input = document.getElementById("rxInput"), rxBox = document.getElementById("rx");
        if(input.value) { rxBox.value += (rxBox.value ? "\n" : "") + input.value; input.value = ""; window.updateMRP(); }
    };

    function encodeFee(num) {
        const map = "ABCDEFGHIJ";
        return String(num).split('').map(digit => map[parseInt(digit)] || digit).join('');
    }

    window.updateMRP = () => {
        const lines = document.getElementById("rx").value.split("\n");
        let sum = 0;
        lines.forEach(line => {
            let up = line.toUpperCase().trim();
            if(!up) return;
            inventory.forEach(med => {
                if(up.includes(med.name.toUpperCase().trim())) {
                    const dMatch = up.match(/(\d+)\s*(OD|BD|TDS|QID|HS|SOS)/) || up.match(/^(\d+)/) || up.match(/(\d+)\s+/);
                    const d = dMatch ? parseInt(dMatch[1]) : 1;
                    let f = (up.includes("BD") ? 2 : (up.includes("TDS") ? 3 : 1));
                    const dayMatch = up.match(/X\s*(\d+)/) || up.match(/(\d+)\s*DAY/);
                    const days = dayMatch ? parseInt(dayMatch[1]) : 1;
                    sum += (d * f * days * (med.mrp || 0));
                }
            });
        });
        document.getElementById("mrp").value = sum.toFixed(2);
        const cfVal = parseInt(document.getElementById("cf").value) || 0;
        document.getElementById("secretCodeDisp").value = encodeFee(cfVal);
        document.getElementById("total").value = "₹" + (sum + cfVal).toFixed(2);
    };

    window.processPrint = async () => {
        const name = document.getElementById("name").value;
        if(!name) return alert("Name?");
        
        const bp = document.getElementById("bp").value.trim();
        const pr = document.getElementById("pr").value.trim();
        const temp = document.getElementById("temp").value.trim();
        const hist = Array.from(document.querySelectorAll("#historyCheckboxList input:checked")).map(i => i.value);
        const tests = Array.from(document.querySelectorAll(".lab-test:checked")).map(i => i.value);
        const code = document.getElementById("secretCodeDisp").value;

        let vitalsStr = "";
        if(bp) vitalsStr += `BP: ${bp} `;
        if(pr) vitalsStr += `Pulse: ${pr} `;
        if(temp) vitalsStr += `Temp: ${temp}`;

        const data = {
            name, age: document.getElementById("age").value, gender: document.getElementById("gender").value,
            history: hist, rx: document.getElementById("rx").value, tests, bp, pr, temp,
            mrp: parseFloat(document.getElementById("mrp").value), cf: parseInt(document.getElementById("cf").value),
            forReview: document.getElementById("markForReview").checked, timestamp: serverTimestamp()
        };

        if(activeLogId) await updateDoc(doc(db, "prescriptions", activeLogId), data);
        else await addDoc(collection(db, "prescriptions"), data);

        // Deduct Stock
        const lines = data.rx.split("\n");
        for (const line of lines) {
            for (const med of inventory) {
                if (line.toUpperCase().includes(med.name.toUpperCase().trim())) {
                    const upLine = line.toUpperCase();
                    const dMatch = upLine.match(/(\d+)/);
                    const d = dMatch ? parseInt(dMatch[0]) : 1;
                    let f = upLine.includes("BD") ? 2 : (upLine.includes("TDS") ? 3 : 1);
                    const dayMatch = upLine.match(/X\s*(\d+)/) || upLine.match(/(\d+)\s*DAY/);
                    const days = dayMatch ? parseInt(dayMatch[1]) : 1;
                    await updateDoc(doc(db, "inventory", med.id), { stock: med.stock - (d * f * days) });
                }
            }
        }

        const win = window.open('', '_blank');
        win.document.write(`<html><body style="font-family:sans-serif; padding:20px;">
            <div style="margin-top:100px;">
                <p><strong>Name:</strong> ${name} &nbsp;&nbsp; <strong>Age/Sex:</strong> ${data.age}/${data.gender} 
                <span style="float:right;">${new Date().toLocaleDateString()}</span></p>
                <p><strong>History:</strong> ${hist.join(", ")} ${document.getElementById("extraHistory").value}</p>
                ${vitalsStr ? `<p><strong>Vitals:</strong> ${vitalsStr}</p>` : ''}
                <hr><p><strong>Rx:</strong></p>
                <pre style="font-size:18px; min-height:280px;">${data.rx}</pre>
                <p><strong>Investigations:</strong> ${tests.join(", ") || "None"}</p>
                <div style="position:fixed; bottom:50px; width:100%; text-align:right;"><strong>CODE: ${code} + MRP</strong></div>
            </div>
        </body></html>`);
        win.document.close(); win.print(); location.reload();
    };

    async function syncData() {
        const invSnap = await getDocs(collection(db, "inventory"));
        inventory = [];
        const dl = document.getElementById("medList"), uiInv = document.getElementById("inventoryListUI");
        dl.innerHTML = ""; uiInv.innerHTML = "";
        invSnap.forEach(d => {
            const m = {id: d.id, ...d.data()}; inventory.push(m);
            dl.innerHTML += `<option value="${m.name}">`;
            uiInv.innerHTML += `<div class="inventory-item"><span>${m.name} (${m.stock})</span> <button class="action" style="background:orange" onclick="editMed('${m.id}')">Edit</button></div>`;
        });

        const tempSnap = await getDocs(collection(db, "templates"));
        templates = [];
        const sel = document.getElementById("templateSelector"); sel.innerHTML = "";
        tempSnap.forEach(d => { const t = {id: d.id, ...d.data()}; templates.push(t); sel.innerHTML += `<option value="${t.id}">${t.name}</option>`; });

        const logSnap = await getDocs(query(collection(db, "prescriptions"), orderBy("timestamp", "desc")));
        logs = [];
        const revUI = document.getElementById("reviewListUI"); revUI.innerHTML = "";
        logSnap.forEach(d => {
            const p = {id: d.id, ...d.data()}; logs.push(p);
            if(p.forReview) revUI.innerHTML += `<div class="inventory-item">${p.name} <button class="action" onclick="recallPatient('${p.id}')">Load</button></div>`;
        });
        updateStats();
    }

    window.saveMedicine = async () => {
        const m = { name: document.getElementById("medName").value, stock: parseInt(document.getElementById("stock").value) || 0, mrp: parseFloat(document.getElementById("mrpInv").value) || 0, expDate: document.getElementById("expDate").value };
        if(editingInvId) await updateDoc(doc(db, "inventory", editingInvId), m); else await addDoc(collection(db, "inventory"), m);
        editingInvId = null; document.querySelectorAll("#invTab input").forEach(i => i.value = ""); syncData();
    };

    window.applyMultiTemplates = () => {
        const selected = Array.from(document.getElementById("templateSelector").selectedOptions).map(o => o.value);
        let h = new Set(), rx = [];
        selected.forEach(id => {
            const t = templates.find(x => x.id === id);
            t.history.forEach(i => h.add(i));
            t.rx.split("\n").forEach(r => { if(r && !rx.includes(r)) rx.push(r); });
        });
        document.getElementById("historyCheckboxList").innerHTML = Array.from(h).map(i => `<label><input type="checkbox" checked value="${i}"> ${i}</label>`).join("");
        document.getElementById("rx").value = rx.join("\n"); updateMRP();
    };

    window.saveCurrentAsTemplate = async () => {
        const name = prompt("Name?");
        if(name) await addDoc(collection(db, "templates"), { name, history: Array.from(document.querySelectorAll("#historyCheckboxList input:checked")).map(i => i.value), rx: document.getElementById("rx").value });
        syncData();
    };

    window.recallPatient = (id) => {
        const p = logs.find(x => x.id === id); activeLogId = id;
        document.getElementById("name").value = p.name; document.getElementById("age").value = p.age; document.getElementById("rx").value = p.rx;
        document.getElementById("bp").value = p.bp || ""; document.getElementById("pr").value = p.pr || ""; document.getElementById("temp").value = p.temp || "";
        document.getElementById("historyCheckboxList").innerHTML = p.history.map(i => `<label><input type="checkbox" checked value="${i}"> ${i}</label>`).join("");
        window.updateMRP(); scrollToSection('prescription');
    };

    window.editMed = (id) => { const m = inventory.find(x => x.id === id); editingInvId = id; document.getElementById("medName").value = m.name; document.getElementById("stock").value = m.stock; document.getElementById("mrpInv").value = m.mrp; showTab('invTab'); };

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        let inc = 0, pts = 0;
        logs.forEach(p => { if(p.timestamp?.toDate().toISOString().split('T')[0] === today) { pts++; inc += (p.mrp + p.cf); } });
        document.getElementById("statPatients").innerText = pts; document.getElementById("statIncome").innerText = "₹" + inc.toFixed(2);
    }
    
    syncData();
</script>
</body>
</html>
