<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management Titan v14.0</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #1abc9c; --accent: #3498db; --danger: #e74c3c; --warning: #f39c12; --light: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        nav { background: #34495e; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 1000; justify-content: center; }
        nav button { background: var(--secondary); border: none; padding: 8px 15px; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .section { background: var(--white); padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .badge { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .check-group { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .check-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; }
        optgroup { font-weight: bold; color: var(--primary); background: #eee; }
        
        @media print {
            nav, header, button, .no-print, #adminPanel, .section:not(#prescription), #templateSelector { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            #prescription { display: block !important; padding: 0; margin-top: 100px; }
            pre { white-space: pre-wrap; font-family: 'Segoe UI', sans-serif; font-size: 18px; border:none; }
        }
        .inventory-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header class="no-print">CLINIC TITAN ERP v14.0</header>

<nav class="no-print">
    <button onclick="scrollToSection('prescription')">New Rx</button>
    <button onclick="scrollToSection('reviewQueue')">Review Queue</button>
    <button onclick="openAdmin()">Admin & Finance</button>
</nav>

<div class="container">
    <div id="alertsContainer" class="no-print"></div>

    <div id="prescription" class="section">
        <h3 class="no-print">Patient Details</h3>
        <div class="grid-3">
            <input id="name" placeholder="Patient Name">
            <input type="number" id="age" placeholder="Age" oninput="checkPediatric()">
            <select id="gender"><option>Male</option><option>Female</option></select>
        </div>
        <div id="pediatricWarning" class="hidden badge">⚠ <strong>Pediatric Alert:</strong> Check weight-based dosing.</div>

        <div class="no-print">
            <h3>Disease Templates (Multi-Select)</h3>
            <select id="templateSelector" multiple onchange="applyMultiTemplates()">
                <optgroup label="General / Fever">
                    <option value="Viral Fever">Viral Fever</option>
                    <option value="Acute Pharyngitis">Acute Pharyngitis</option>
                </optgroup>
                <optgroup label="Respiratory">
                    <option value="URTI">URTI (Cold/Cough)</option>
                    <option value="Bronchitis">LRTI / Bronchitis</option>
                    <option value="Asthma">Asthma/COPD</option>
                </optgroup>
                <optgroup label="Gastrointestinal">
                    <option value="AGE">AGE (Diarrhea/Vomiting)</option>
                    <option value="Gastritis">Gastritis / APD</option>
                    <option value="Enteric">Enteric Fever</option>
                </optgroup>
                <optgroup label="Urinary & Derm">
                    <option value="UTI">UTI</option>
                    <option value="Dermatitis">Dermatitis</option>
                </optgroup>
            </select>
            <div id="historyCheckboxList" style="margin:10px 0;"></div>
            <textarea id="extraHistory" rows="2" placeholder="Clinical Findings..."></textarea>
        </div>

        <div class="grid-3 no-print">
            <input id="bp" placeholder="BP">
            <input id="pr" placeholder="Pulse">
            <input id="temp" placeholder="Temp">
        </div>

        <h3>Prescription (Rx)</h3>
        <div class="no-print" style="display:flex; gap:10px;">
            <input list="medList" id="rxInput" placeholder="Search Med...">
            <datalist id="medList"></datalist>
            <button class="action" onclick="addManualRx()">Add</button>
        </div>
        <textarea id="rx" rows="10" placeholder="Med Name 1 BD X 5 DAYS" onkeyup="updateMRP()"></textarea>

        <h3>Investigations</h3>
        <div class="check-group">
            <label><input type="checkbox" class="lab-test" value="CBC"> CBC</label>
            <label><input type="checkbox" class="lab-test" value="ESR"> ESR</label>
            <label><input type="checkbox" class="lab-test" value="URINE R/E"> URINE R/E</label>
            <label><input type="checkbox" class="lab-test" value="USG ABDOMEN"> USG ABDOMEN</label>
            <label><input type="checkbox" class="lab-test" value="RBS"> RBS</label>
        </div>

        <div class="no-print" style="margin-top:15px;">
            <label><input type="checkbox" id="markForReview"> Keep in Review</label>
            <button onclick="saveCurrentAsTemplate()" style="float:right; border:none; background:none; color:var(--accent); text-decoration:underline; cursor:pointer;">Save as Custom Template</button>
        </div>
    </div>

    <div id="billing" class="section no-print">
        <h3>Billing</h3>
        <div class="grid-3">
            <div><label>Consult Fee</label><input id="cf" type="number" value="0" oninput="updateMRP()"></div>
            <div>
                <label>Medicine MRP</label>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input id="mrp" type="number" value="0" readonly>
                    <label style="font-size:11px; min-width:80px;"><input type="checkbox" id="toggleMrpPrint" checked> + MRP</label>
                </div>
            </div>
            <div><label>Code</label><input id="secretCodeDisp" readonly style="background:#eee; font-weight:bold;"></div>
        </div>
    </div>

    <div id="reviewQueue" class="section no-print"><h3>Review Queue</h3><div id="reviewListUI"></div></div>

    <div id="adminPanel" class="section hidden no-print">
        <div class="grid-3">
            <div class="stat-card"><span>Patients</span><h2 id="statPatients">0</h2></div>
            <div class="stat-card"><span>Total ₹</span><h2 id="statIncome">₹0</h2></div>
            <div class="stat-card"><span>Med ₹</span><h2 id="statMeds">₹0</h2></div>
        </div>
        <div style="margin:20px 0;">
            <button class="action" onclick="showTab('invTab')">Inventory</button>
            <button class="action" onclick="showTab('tempTab')">Saved Templates</button>
            <button class="action" onclick="showTab('logTab')">Logs</button>
        </div>
        <div id="invTab">
            <input id="medName" placeholder="Med Name">
            <input id="stock" type="number" placeholder="Qty">
            <input id="mrpInv" type="number" placeholder="MRP">
            <input id="expDate" type="date">
            <button class="action" onclick="saveMedicine()" style="width:100%; margin:10px 0;">Update Stock</button>
            <div id="inventoryListUI"></div>
        </div>
        <div id="tempTab" class="hidden"><div id="templateListUI"></div></div>
        <div id="logTab" class="hidden"><div id="logListUI"></div></div>
    </div>
</div>

<button id="printBtn" class="no-print" onclick="processPrint()" style="display:block; margin:20px auto; padding:15px 100px; background:var(--secondary); color:white; border:none; border-radius:12px; font-size:20px; cursor:pointer; font-weight:bold;">PRINT RX</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, updateDoc, doc, getDocs, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdwITU8DS8u9cMEabaoLRAwqmS1P8AegA",
        authDomain: "prescription-drjmd.firebaseapp.com",
        projectId: "prescription-drjmd",
        storageBucket: "prescription-drjmd.firebasestorage.app",
        messagingSenderId: "530828278027",
        appId: "1:530828278027:web:b2c437c98eedb4c23d0a0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });

    let inventory = [], templates = [], logs = [], activeLogId = null, editingInvId = null;

    // --- MASTER TEMPLATE DATA ---
    const clinicalMaster = {
        "Viral Fever": {h:["Fever", "Myalgia", "Headache", "Weakness"], r:"T. Paracetamol 650mg 1 TDS X 3 DAYS"},
        "Acute Pharyngitis": {h:["Sore Throat", "Pain during swallowing", "Fever"], r:"T. Azithromycin 500mg 1 OD X 3 DAYS\nT. Paracetamol 650mg 1 BD X 3 DAYS"},
        "URTI": {h:["Cough", "Running Nose", "Sneezing"], r:"T. Cetirizine 10mg 1 HS X 5 DAYS\nSyp. Ascoril 10ml TDS"},
        "Bronchitis": {h:["Productive Cough", "Chest Congestion", "Breathlessness"], r:"T. Augmentin 625mg 1 BD X 5 DAYS\nSyp. Ambroxol 10ml TDS"},
        "Asthma": {h:["Wheezing", "Dry Cough", "Tightness in Chest"], r:"Inhaler Salbutamol 2 puffs SOS\nT. Deriphyllin 150mg 1 BD X 5 DAYS"},
        "AGE": {h:["Loose Stools", "Vomiting", "Abdominal Cramps"], r:"T. Norflox-TZ 1 BD X 5 DAYS\nORS 1 PKT SOS\nT. Pantop 40mg 1 OD (AC)"},
        "Gastritis": {h:["Heartburn", "Epigastric Pain", "Bloating"], r:"C. Pan-D 1 OD (AC) X 10 DAYS\nSyp. Sucralfate 10ml TDS"},
        "Enteric": {h:["Step-ladder Fever", "Coated Tongue", "Anorexia"], r:"T. Cefixime 200mg 1 BD X 7 DAYS\nT. Paracetamol 650mg 1 TDS"},
        "UTI": {h:["Burning Micturition", "Frequency", "Lower Abdominal Pain"], r:"T. Nitrofurantoin 100mg 1 BD X 5 DAYS\nSyp. Citralka 10ml TDS"},
        "Dermatitis": {h:["Itching", "Redness", "Skin Lesions"], r:"T. Levocetirizine 5mg 1 HS X 10 DAYS\nCream Betadine Apply Locally"}
    };

    // --- WINDOW GLOBALS ---
    window.scrollToSection = (id) => document.getElementById(id).scrollIntoView({behavior:"smooth"});
    window.openAdmin = () => { if(prompt("Auth?") === "1234") document.getElementById("adminPanel").classList.toggle("hidden"); };
    window.showTab = (id) => { ["invTab", "tempTab", "logTab"].forEach(t => document.getElementById(t).classList.add("hidden")); document.getElementById(id).classList.remove("hidden"); };
    window.checkPediatric = () => document.getElementById("pediatricWarning").classList.toggle("hidden", !(document.getElementById("age").value < 14));
    window.addManualRx = () => { const i = document.getElementById("rxInput"), r = document.getElementById("rx"); if(i.value) { r.value += (r.value ? "\n" : "") + i.value; i.value = ""; window.updateMRP(); } };

    function encodeFee(num) {
        const map = "ABCDEFGHIJ";
        return String(num).split('').map(digit => map[parseInt(digit)] || digit).join('');
    }

    // --- CALCULATION ---
    window.updateMRP = () => {
        const lines = document.getElementById("rx").value.split("\n");
        let sum = 0;
        lines.forEach(line => {
            const up = line.toUpperCase().trim();
            if(!up) return;
            inventory.forEach(med => {
                if(up.includes(med.name.toUpperCase().trim())) {
                    const dMatch = up.match(/(\d+)\s*(OD|BD|TDS|QID|HS|SOS)/) || up.match(/^(\d+)/) || up.match(/(\d+)\s+/);
                    const d = dMatch ? parseInt(dMatch[1]) : 1;
                    const f = up.includes("BD") ? 2 : (up.includes("TDS") ? 3 : (up.includes("QID") ? 4 : 1));
                    const dayMatch = up.match(/X\s*(\d+)/) || up.match(/(\d+)\s*DAY/);
                    const days = dayMatch ? parseInt(dayMatch[1]) : 1;
                    sum += (d * f * days * (med.mrp || 0));
                }
            });
        });
        document.getElementById("mrp").value = sum.toFixed(2);
        const cf = parseInt(document.getElementById("cf").value) || 0;
        document.getElementById("secretCodeDisp").value = encodeFee(cf);
        document.getElementById("total").value = "₹" + (sum + cf).toFixed(2);
    };

    // --- TEMPLATE LOGIC ---
    window.applyMultiTemplates = () => {
        const selected = Array.from(document.getElementById("templateSelector").selectedOptions).map(o => o.value);
        let hSet = new Set(), rxSet = new Set();
        
        selected.forEach(val => {
            const data = clinicalMaster[val] || templates.find(t => t.name === val);
            if(data) {
                data.h ? data.h.forEach(i => hSet.add(i)) : data.history.forEach(i => hSet.add(i));
                const meds = data.r ? data.r.split("\n") : data.rx.split("\n");
                meds.forEach(m => { if(m.trim()) rxSet.add(m.trim()); });
            }
        });

        document.getElementById("historyCheckboxList").innerHTML = Array.from(hSet).map(i => `<label><input type="checkbox" checked value="${i}"> ${i}</label>`).join("");
        document.getElementById("rx").value = Array.from(rxSet).join("\n");
        window.updateMRP();
    };

    // --- PRINT & RECALL ---
    window.processPrint = async () => {
        const name = document.getElementById("name").value;
        const cf = parseInt(document.getElementById("cf").value) || 0;
        const mrpVal = parseFloat(document.getElementById("mrp").value) || 0;
        const rx = document.getElementById("rx").value;
        if(!name) return alert("Name Required");

        const history = Array.from(document.querySelectorAll("#historyCheckboxList input:checked")).map(i => i.value);
        const tests = Array.from(document.querySelectorAll(".lab-test:checked")).map(i => i.value);
        const bp = document.getElementById("bp").value, pr = document.getElementById("pr").value, temp = document.getElementById("temp").value;
        const showMrpText = document.getElementById("toggleMrpPrint").checked;

        const data = { name, age: document.getElementById("age").value, gender: document.getElementById("gender").value, history, rx, tests, bp, pr, temp, mrp: mrpVal, cf, forReview: document.getElementById("markForReview").checked, timestamp: serverTimestamp() };

        if(activeLogId) await updateDoc(doc(db, "prescriptions", activeLogId), data);
        else await addDoc(collection(db, "prescriptions"), data);

        // Deduct Stock
        for (const line of rx.split("\n")) {
            for (const med of inventory) {
                if (line.toUpperCase().includes(med.name.toUpperCase().trim())) {
                    const dMatch = line.match(/(\d+)/); const d = dMatch ? parseInt(dMatch[0]) : 1;
                    const f = line.toUpperCase().includes("BD") ? 2 : (line.toUpperCase().includes("TDS") ? 3 : 1);
                    const dayMatch = line.match(/X\s*(\d+)/) || line.match(/(\d+)\s*DAY/); const days = dayMatch ? parseInt(dayMatch[1]) : 1;
                    await updateDoc(doc(db, "inventory", med.id), { stock: med.stock - (d * f * days) });
                }
            }
        }

        const win = window.open('', '_blank');
        win.document.write(`<html><body style="font-family:sans-serif; padding:40px;">
            <div style="margin-top:100px;">
                <p><strong>Name:</strong> ${name} &nbsp;&nbsp; <strong>Age/Sex:</strong> ${data.age}/${data.gender} <span style="float:right;">${new Date().toLocaleDateString()}</span></p>
                <p><strong>History:</strong> ${history.join(", ")} ${document.getElementById("extraHistory").value}</p>
                ${(bp||pr||temp) ? `<p><strong>Vitals:</strong> ${bp?'BP:'+bp+' ':''} ${pr?'P:'+pr+' ':''} ${temp?'T:'+temp+' ':''}</p>` : ''}
                <hr><pre style="min-height:280px;">${rx}</pre>
                <p><strong>Investigations:</strong> ${tests.join(", ") || "None"}</p>
                <div style="position:fixed; bottom:50px; width:100%; text-align:right;"><strong>CODE: ${encodeFee(cf)} ${showMrpText ? '+ MRP' : ''}</strong></div>
            </div></body></html>`);
        win.document.close(); win.print(); location.reload();
    };

    window.recallPatient = (id) => {
        const p = logs.find(x => x.id === id); activeLogId = id;
        document.getElementById("name").value = p.name; document.getElementById("age").value = p.age; document.getElementById("rx").value = p.rx;
        document.getElementById("cf").value = p.cf || 0;
        document.getElementById("bp").value = p.bp || ""; document.getElementById("pr").value = p.pr || ""; document.getElementById("temp").value = p.temp || "";
        document.querySelectorAll(".lab-test").forEach(box => { box.checked = p.tests?.includes(box.value); });
        document.getElementById("historyCheckboxList").innerHTML = p.history.map(h => `<label><input type="checkbox" checked value="${h}"> ${h}</label>`).join("");
        window.updateMRP(); scrollToSection('prescription');
    };

    // --- REFRESH ---
    async function sync() {
        const invSnap = await getDocs(collection(db, "inventory"));
        inventory = invSnap.docs.map(d => ({id: d.id, ...d.data()}));
        const uiInv = document.getElementById("inventoryListUI"), dl = document.getElementById("medList");
        uiInv.innerHTML = ""; dl.innerHTML = "";
        inventory.forEach(m => {
            dl.innerHTML += `<option value="${m.name}">`;
            uiInv.innerHTML += `<div class="inventory-item"><span>${m.name} (${m.stock})</span><button class="action" style="background:orange" onclick="editMed('${m.id}')">Edit</button></div>`;
        });
        const logSnap = await getDocs(query(collection(db, "prescriptions"), orderBy("timestamp", "desc")));
        logs = logSnap.docs.map(d => ({id: d.id, ...d.data()}));
        const revUI = document.getElementById("reviewListUI"); revUI.innerHTML = "";
        logs.forEach(p => { if(p.forReview) revUI.innerHTML += `<div class="inventory-item">${p.name} <button class="action" onclick="recallPatient('${p.id}')">View</button></div>`; });
        updateFinance();
    }

    window.saveMedicine = async () => {
        const m = { name: document.getElementById("medName").value, stock: parseInt(document.getElementById("stock").value) || 0, mrp: parseFloat(document.getElementById("mrpInv").value) || 0, expDate: document.getElementById("expDate").value };
        if(editingInvId) await updateDoc(doc(db, "inventory", editingInvId), m); else await addDoc(collection(db, "inventory"), m);
        editingInvId = null; sync();
    };

    window.editMed = (id) => { const m = inventory.find(x=>x.id===id); editingInvId=id; document.getElementById("medName").value=m.name; document.getElementById("stock").value=m.stock; document.getElementById("mrpInv").value=m.mrp; showTab('invTab'); };

    function updateFinance() {
        const today = new Date().toISOString().split('T')[0];
        let pts = 0, inc = 0, mSum = 0;
        logs.forEach(p => { if(p.timestamp?.toDate().toISOString().split('T')[0] === today) { pts++; mSum += (p.mrp || 0); inc += ((p.mrp || 0) + (p.cf || 0)); } });
        document.getElementById("statPatients").innerText = pts; document.getElementById("statIncome").innerText = "₹" + inc.toFixed(2); document.getElementById("statMeds").innerText = "₹" + mSum.toFixed(2);
    }
    
    sync();
</script>
</body>
</html>
