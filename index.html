<!DOCTYPE html>
<html>
<head>
<title>Clinic OPD System</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#34495e;
padding:10px;
display:flex;
gap:10px;
position:sticky;
top:0;
}

nav button{
background:#1abc9c;
border:none;
padding:10px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

nav button:hover{
background:#16a085;
}

.container{
padding:20px;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button.action{
background:#3498db;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

button.action:hover{
background:#2980b9;
}

.hidden{
display:none;
}

.inventory-item{
border-bottom:1px solid #ddd;
padding:6px;
}

</style>
</head>

<body>

<header>Clinic OPD Management</header>

<nav>
<button onclick="scrollToSection('prescription')">Prescription</button>
<button onclick="scrollToSection('billing')">Billing</button>
<button onclick="scrollToSection('review')">Review</button>
<button onclick="openAdmin()">Authorized Panel</button>
</nav>

<div class="container">

<div id="prescription" class="section">

<h3>Patient Details</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Template</label>
<select id="template" onchange="applyTemplate()"></select>

<h3>History</h3>
<textarea id="history" rows="5"></textarea>

<h3>Examination</h3>
<input id="bp" placeholder="BP">
<input id="pr" placeholder="Pulse">
<input id="temp" placeholder="Temperature">
<textarea id="exam" rows="3"></textarea>

<h3>Prescription</h3>
<textarea id="rx" rows="6"></textarea>

<button class="action" onclick="printRx()">Print</button>

</div>

<div id="billing" class="section">

<h3>Billing</h3>

<input id="cf" placeholder="Consultation Fee">
<input id="mrp" placeholder="Medicine MRP">

<button class="action" onclick="calculate()">Calculate</button>

<input id="total" placeholder="Total">

</div>

<div id="review" class="section">

<h3>Review Queue</h3>

<button class="action" onclick="addReview()">Add Review</button>

<ul id="reviewList"></ul>

</div>

<div id="adminPanel" class="section hidden">

<h3>Authorized Panel</h3>

<h3>Add Template</h3>

<input id="tempName" placeholder="Template Name">

<textarea id="tempHistory" placeholder="History Template"></textarea>

<textarea id="tempRx" placeholder="Prescription Template"></textarea>

<button class="action" onclick="addTemplate()">Add Template</button>

<h3>Inventory</h3>

<input id="medName" placeholder="Medicine Name">
<input id="batch" placeholder="Batch">
<input id="exp" placeholder="Expiry">
<input id="hsn" placeholder="HSN Code">
<input id="purchase" placeholder="Purchase Rate">
<input id="sell" placeholder="Selling Rate">
<input id="mrpInv" placeholder="MRP">
<input id="stock" placeholder="Stock">

<button class="action" onclick="addMedicine()">Add Medicine</button>

<div id="inventoryList"></div>

</div>

</div>

<script>

let templates=JSON.parse(localStorage.getItem("templates"))||{

UTI:{
history:"Burning micturition\nFrequency of urination\nUrgency\nNo flank pain",
rx:"Tab Cefixime 200 mg BD x5 days\nTab Paracetamol SOS"
},

URTI:{
history:"Fever\nCough\nRunning nose\nSore throat",
rx:"Tab Azithromycin 500 OD x3 days\nParacetamol SOS"
}

}

function loadTemplates(){

let select=document.getElementById("template")

select.innerHTML="<option value=''>Select Template</option>"

for(let key in templates){

let opt=document.createElement("option")

opt.value=key
opt.innerText=key

select.appendChild(opt)

}

}

function applyTemplate(){

let t=document.getElementById("template").value

if(!t)return

document.getElementById("history").value=templates[t].history
document.getElementById("rx").value=templates[t].rx

}

function addTemplate(){

let name=document.getElementById("tempName").value

templates[name]={

history:document.getElementById("tempHistory").value,
rx:document.getElementById("tempRx").value

}

localStorage.setItem("templates",JSON.stringify(templates))

loadTemplates()

alert("Template Added")

}

function scrollToSection(id){

document.getElementById(id).scrollIntoView({behavior:"smooth"})

}

function calculate(){

let cf=parseFloat(document.getElementById("cf").value)||0
let mrp=parseFloat(document.getElementById("mrp").value)||0

document.getElementById("total").value=cf+mrp

}

function printRx(){

let text=

"Name:"+name.value+
"\nAge:"+age.value+
"\nGender:"+gender.value+

"\n\nHistory\n"+history.value+

"\n\nExamination\nBP:"+bp.value+" Pulse:"+pr.value+" Temp:"+temp.value+"\n"+exam.value+

"\n\nPrescription\n"+rx.value+

"\n\nFee + MRP"

let w=window.open()

w.document.write("<pre>"+text+"</pre>")

w.print()

}

function addReview(){

let li=document.createElement("li")

li.innerText=name.value

document.getElementById("reviewList").appendChild(li)

}

function openAdmin(){

let p=prompt("Enter Password")

if(p=="1234"){

document.getElementById("adminPanel").classList.remove("hidden")

}

}

let inventory=[]

function addMedicine(){

let med={

name:medName.value,
batch:batch.value,
exp:exp.value,
hsn:hsn.value,
purchase:purchase.value,
sell:sell.value,
mrp:mrpInv.value,
stock:stock.value

}

inventory.push(med)

let div=document.createElement("div")

div.className="inventory-item"

div.innerText=

med.name+" | Batch:"+med.batch+" | Exp:"+med.exp+" | HSN:"+med.hsn+" | MRP:"+med.mrp+" | Stock:"+med.stock

document.getElementById("inventoryList").appendChild(div)

}

loadTemplates()

</script>

</body>
</html>
