<!DOCTYPE html>
<html>
<head>
<title>Clinic OPD System</title>
<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(120deg,#89f7fe,#66a6ff);
}
header{
  background:#2c3e50;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}
nav{
  background:#34495e;
  padding:10px;
  display:flex;
  gap:10px;
  position:sticky;
  top:0;
}
nav button{
  background:#1abc9c;
  border:none;
  padding:10px 14px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
nav button:hover{
  background:#16a085;
}
.container{
  padding:20px;
}
.section{
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
input,select,textarea{
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ccc;
}
button.action{
  background:#3498db;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:6px;
  cursor:pointer;
}
button.action:hover{
  background:#2980b9;
}
.hidden{
  display:none;
}
.inventory-item{
  border-bottom:1px solid #ddd;
  padding:6px;
}
#printBtn {
  display:block;
  margin:20px auto;
  padding:12px 30px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
#printBtn:hover{
  background:#218838;
}
/* History checkbox styling */
#historyList label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
  font-size:15px;
}
</style>
</head>
<body>

<header>Clinic OPD Management</header>

<nav>
<button onclick="scrollToSection('prescription')">Prescription</button>
<button onclick="scrollToSection('billing')">Billing</button>
<button onclick="scrollToSection('review')">Review</button>
<button onclick="openAdmin()">Authorized Panel</button>
</nav>

<div class="container">

<div id="prescription" class="section">
<h3>Patient Details</h3>

<input id="name" placeholder="Name">

<input type="number" id="age" placeholder="Age" oninput="checkPediatric()">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Templates (Ctrl+Click for multiple)</label>
<select id="template" multiple size="4" onchange="applyTemplates()"></select>

<h3>History</h3>
<div id="historyList"></div>

<h3>Extra History</h3>
<textarea id="extraHistory" rows="3" placeholder="Add extra history here" onkeyup="applyTemplates()"></textarea><input id="bp" placeholder="BP">
<input id="pr" placeholder="Pulse">
<input id="temp" placeholder="Temperature">
<textarea id="exam" rows="3"></textarea>

<h3>Prescription</h3>

<div id="pediatricWarning" style="display:none;color:red;font-weight:bold;">
⚠ Pediatric patient – adjust dosage (mg/kg)
</div>

<textarea id="rx" rows="6"></textarea>
</div>

<div id="billing" class="section">
<h3>Billing</h3>
<input id="cf" placeholder="Consultation Fee">
<input id="mrp" placeholder="Total MRP (Doctor only)">
<button class="action" onclick="calculate()">Calculate</button>
<input id="total" placeholder="Total Amount">
</div>

<div id="review" class="section">
<h3>Review Queue</h3>
<button class="action" onclick="addReview()">Add Review</button>
<ul id="reviewList"></ul>
</div>

<div id="adminPanel" class="section hidden">
<h3>Authorized Panel</h3>
<h3>Add Template</h3>
<input id="tempName" placeholder="Template Name">
<textarea id="tempHistory" placeholder="History Template (comma separated)"></textarea>
<textarea id="tempRx" placeholder="Prescription Template (comma separated)"></textarea>
<button class="action" onclick="addTemplate()">Add Template</button>

<h3>Inventory</h3>
<input id="medName" placeholder="Medicine Name">
<input id="batch" placeholder="Batch">
<input id="exp" placeholder="Expiry">
<input id="hsn" placeholder="HSN Code">
<input id="purchase" placeholder="Purchase Rate">
<input id="sell" placeholder="Selling Rate">
<input id="mrpInv" placeholder="MRP">
<input id="stock" placeholder="Stock">
<button class="action" onclick="addMedicine()">Add Medicine</button>
<div id="inventoryList"></div>
</div>

</div>
<button id="printBtn" onclick="printRx()">Print Prescription</button>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBdwITU8DS8u9cMEabaoLRAwqmS1P8AegA",
    authDomain: "prescription-drjmd.firebaseapp.com",
    projectId: "prescription-drjmd",
    storageBucket: "prescription-drjmd.firebasestorage.app",
    messagingSenderId: "530828278027",
    appId: "1:530828278027:web:b2c437c98eedb4c23d0a0e",
    measurementId: "G-17GNP2MHQV"
  };

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const db = getFirestore(app);

/* make Firebase usable in your main script */
window.db = db;
window.addDoc = addDoc;
window.collection = collection;

</script>
<script>

/* Firebase save function */
async function savePrescription() {
  try {
    const checkedHistory = Array.from(document.querySelectorAll("#historyList input:checked"))
                                .map(cb => cb.value);

    await addDoc(collection(db, "prescriptions"), {
      name: document.getElementById("name").value,
      age: document.getElementById("age").value,
      gender: document.getElementById("gender").value,
      history: checkedHistory,           // Array of history
      extraHistory: document.getElementById("extraHistory").value,
      exam: {
        bp: document.getElementById("bp").value,
        pr: document.getElementById("pr").value,
        temp: document.getElementById("temp").value,
        notes: document.getElementById("exam").value
      },
      rx: document.getElementById("rx").value.split("\n"), // Array of meds
      totalMRP: parseFloat(document.getElementById("mrp").value) || 0,
      timestamp: serverTimestamp() // auto date/time
    });

    console.log("Prescription saved to Firestore!");
  } catch (e) {
    console.error("Error adding prescription: ", e);
  }
}
  // Load templates
// 1️⃣ Define default templates in code
const defaultTemplates = {
  UTI: {
    history: ["Burning micturition","Frequency of urination","Urgency","No flank pain"],
    rx: ["T.Cefixime 200mg BD x5 days","T.Paracetamol 650mg SOS"]
  },

  Sinusitis: {
    history: ["Nasal congestion","Headache","Post-nasal drip"],
    rx: ["T.Amoxicillin 500mg BD x5 days","T.Paracetamol 650mg SOS"]
  },

  GERD:{
    history:["Burning epigastric pain","Acid reflux","Post-meal discomfort"],
    rx:["T.Pantoprazole 40mg OD before food","Syp.Antacid 10ml TDS"]
  },

  ViralFever:{
    history:["Fever","Body ache","Weakness"],
    rx:["T.Paracetamol 650mg SOS","ORS oral hydration"]
  },

  URTI:{
    history:["Fever","Cough","Runny nose","Sore throat"],
    rx:["T.Azithromycin 500mg OD x3 days","T.Paracetamol 650mg SOS","T.Levocetirizine 5mg HS"]
  },

  AGE:{
    history:["Loose stools","Vomiting","Abdominal cramps"],
    rx:["ORS oral hydration","Cap.Racecadotril 100mg BD","T.Ondansetron 4mg SOS"]
  },

  Migraine:{
    history:["Unilateral headache","Photophobia","Nausea"],
    rx:["T.Sumatriptan 50mg SOS","T.Paracetamol 650mg SOS"]
  },

  TensionHeadache:{
    history:["Band-like headache","Stress","Neck stiffness"],
    rx:["T.Paracetamol 650mg SOS","T.Thiocolchicoside HS"]
  },

  AllergicRhinitis:{
    history:["Sneezing","Runny nose","Nasal itching"],
    rx:["T.Levocetirizine 5mg HS","T.Montelukast 10mg HS"]
  },

  Tonsillitis:{
    history:["Sore throat","Painful swallowing","Fever"],
    rx:["T.Amoxicillin 500mg BD","T.Paracetamol 650mg SOS"]
  },

  Pharyngitis:{
    history:["Throat pain","Difficulty swallowing","Fever"],
    rx:["T.Azithromycin 500mg OD x3 days","Warm saline gargle"]
  },

  OtitisMedia:{
    history:["Ear pain","Reduced hearing","Fever"],
    rx:["T.Amoxicillin 500mg BD","T.Paracetamol 650mg SOS"]
  },

  Conjunctivitis:{
    history:["Red eye","Watering","Sticky discharge"],
    rx:["Moxifloxacin eye drops TDS","Cold compress"]
  },

  Bronchitis:{
    history:["Cough","Sputum","Mild fever"],
    rx:["T.Azithromycin 500mg OD","Syp.Cough syrup 10ml TDS"]
  },

  Asthma:{
    history:["Wheezing","Breathlessness","Night cough"],
    rx:["Inh.Salbutamol inhaler SOS","T.Montelukast 10mg HS"]
  },

  LowBackPain:{
    history:["Lower back pain","Movement restriction"],
    rx:["T.Aceclofenac 100mg BD","T.Thiocolchicoside HS"]
  },

  CervicalSpondylosis:{
    history:["Neck pain","Radiating arm pain","Stiffness"],
    rx:["T.Aceclofenac BD","T.Thiocolchicoside HS"]
  },

  KneePain:{
    history:["Knee pain","Difficulty walking"],
    rx:["T.Aceclofenac BD","Topical NSAID gel local application"]
  },

  Constipation:{
    history:["Hard stools","Straining","Incomplete evacuation"],
    rx:["Syp.Lactulose 15ml HS"]
  },

  Gastritis:{
    history:["Epigastric pain","Nausea","Vomiting"],
    rx:["T.Pantoprazole 40mg OD","T.Domperidone BD"]
  },

  SkinAllergy:{
    history:["Itching","Red rash","Allergen exposure"],
    rx:["T.Levocetirizine 5mg HS","Topical steroid cream local application"]
  },

  FungalInfection:{
    history:["Itching","Circular rash","Scaling"],
    rx:["Clotrimazole cream local application","T.Fluconazole weekly"]
  },

  Cellulitis:{
    history:["Red swelling","Pain","Fever"],
    rx:["T.Amoxicillin Clavulanate 625mg BD"]
  },

  GasBloating:{
    history:["Abdominal fullness","Burping","Discomfort"],
    rx:["T.Pantoprazole 40mg OD","Syp.Simethicone 10ml TDS"]
  },

  Anemia:{
    history:["Fatigue","Pallor","Breathlessness"],
    rx:["T.Iron Folic Acid OD"]
  }

};


// 2️⃣ Get stored templates if any
let storedTemplates = JSON.parse(localStorage.getItem("templates")) || {};

// 3️⃣ Merge them: stored templates overwrite defaults if same key
let templates = {...defaultTemplates, ...storedTemplates};

// 4️⃣ Save merged version back to localStorage
localStorage.setItem("templates", JSON.stringify(templates));

// Load inventory
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

function loadTemplates(){
  let select = document.getElementById("template");
  select.innerHTML="";
  for(let key in templates){
    let opt = document.createElement("option");
    opt.value = key;
    opt.innerText = key;
    select.appendChild(opt);
  }
}

// Render combined history with checkboxes
function renderHistory(historyItems){
  let container = document.getElementById("historyList");
  container.innerHTML="";

  historyItems.forEach(item=>{

    let label = document.createElement("label");
    label.style.display = "block";   // makes each item appear on new line

    let checkbox = document.createElement("input");
    checkbox.type="checkbox";
    checkbox.value=item;
    checkbox.checked=true;

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" " + item)); // adds space

    container.appendChild(label);

  });
}

function checkPediatric(){

  let ageInput = document.getElementById("age").value;
  let warning = document.getElementById("pediatricWarning");

  if(ageInput !== "" && Number(ageInput) < 14){
      warning.style.display = "block";
  }else{
      warning.style.display = "none";
  }

}
  // Apply multiple selected templates
function applyTemplates(){

  let selected = Array.from(document.getElementById("template").selectedOptions).map(o=>o.value);

  let combinedHistory = [];
  let combinedRx = [];

  selected.forEach(t=>{
    templates[t].history.forEach(h=>{
      if(!combinedHistory.includes(h)) combinedHistory.push(h);
    });
    templates[t].rx.forEach(r=>{
      if(!combinedRx.includes(r)) combinedRx.push(r);
    });
  });

  // ⭐ ADD THIS PART
  let extra = document.getElementById("extraHistory").value
      .split("\n")
      .map(x=>x.trim())
      .filter(x=>x!="");

  extra.forEach(h=>{
      if(!combinedHistory.includes(h)) combinedHistory.push(h);
  });
  // ⭐ END ADD

  renderHistory(combinedHistory);

  document.getElementById("rx").value = combinedRx.join("\n");

  updateMRP();
}

// Add new template
function addTemplate(){
  let name=document.getElementById("tempName").value;
  let hist = document.getElementById("tempHistory").value.split(",").map(s=>s.trim()).filter(s=>s);
  let rx = document.getElementById("tempRx").value.split(",").map(s=>s.trim()).filter(s=>s);
  templates[name]={history:hist,rx:rx};
  localStorage.setItem("templates",JSON.stringify(templates));
  loadTemplates();
  alert("Template added!");
}

// Inventory
function loadInventory(){
  let list = document.getElementById("inventoryList");
  list.innerHTML="";
  inventory.forEach(med=>{
    let div = document.createElement("div");
    div.className="inventory-item";
    div.innerText =
      med.name+" | Batch:"+med.batch+" | Exp:"+med.exp+
      " | HSN:"+med.hsn+" | Purchase:"+med.purchase+
      " | Sell:"+med.sell+" | MRP:"+med.mrp+" | Stock:"+med.stock;
    list.appendChild(div);
  });
}

// Add medicine
function addMedicine(){
  let med={
    name:medName.value,
    batch:batch.value,
    exp:exp.value,
    hsn:hsn.value,
    purchase:purchase.value,
    sell:sell.value,
    mrp:mrpInv.value,
    stock:stock.value
  };
  inventory.push(med);
  localStorage.setItem("inventory",JSON.stringify(inventory));
  loadInventory();
  updateMRP();
}

// Auto-calculate total MRP from medicines in prescription
function updateMRP(){
  let rxLines = document.getElementById("rx").value.split("\n");
  let totalMRP=0;
  rxLines.forEach(line=>{
    let medName=line.split(" ")[0]; // crude matching, assumes first word = medicine
    let med = inventory.find(m=>m.name.toLowerCase()===medName.toLowerCase());
    if(med) totalMRP += parseFloat(med.mrp)||0;
  });
  document.getElementById("mrp").value=totalMRP;
}

// Print
function printRx() {
  // Get checked history items
  let checkedHistory = Array.from(document.querySelectorAll("#historyList input:checked"))
                             .map(cb => cb.value)
                             .join("\n");

  // Start building the print text
  let text = "Name: " + document.getElementById("name").value +
             "\nAge: " + document.getElementById("age").value +
             "\nGender: " + document.getElementById("gender").value +
             "\n\nHistory\n" + checkedHistory;

  // Only add BP/PR/Temp if they have values
  let bp = document.getElementById("bp").value.trim();
  let pr = document.getElementById("pr").value.trim();
  let temp = document.getElementById("temp").value.trim();
  let exam = document.getElementById("exam").value.trim();

  if (bp || pr || temp || exam) {
    text += "\n\nExamination";
    if(bp) text += "\nBP: " + bp;
    if(pr) text += " Pulse: " + pr;
    if(temp) text += " Temp: " + temp;
    if(exam) text += "\n" + exam;
  }

  // Prescription
  let rx = document.getElementById("rx").value;
  if(rx) text += "\n\nPrescription\n" + rx;

  // Always add code + MRP
  text += "\n\nCODE + MRP";
  let data = {
  name: document.getElementById("name").value,
  age: document.getElementById("age").value,
  gender: document.getElementById("gender").value,
  history: checkedHistory,
  bp: bp,
  pulse: pr,
  temp: temp,
  exam: exam,
  prescription: rx,
  time: new Date()
};

savePrescription(data);
  // Open print window
  let w = window.open();
  w.document.write("<pre>" + text + "</pre>");
  w.print();
}

// Billing
function calculate(){
  let cf=parseFloat(document.getElementById("cf").value)||0;
  let mrp=parseFloat(document.getElementById("mrp").value)||0;
  document.getElementById("total").value = cf + mrp;
}

// Review
function addReview(){
  let li=document.createElement("li");
  li.innerText=document.getElementById("name").value;
  document.getElementById("reviewList").appendChild(li);
}

// Scroll
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:"smooth"});}

// Admin
function openAdmin(){
  let p = prompt("Enter Password");
  if(p=="1234"){document.getElementById("adminPanel").classList.remove("hidden");}
}

// Initialize
loadTemplates();
loadInventory();

</script>
</body>
</html>
